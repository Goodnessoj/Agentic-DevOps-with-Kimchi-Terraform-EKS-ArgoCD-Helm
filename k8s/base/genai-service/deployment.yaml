apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-service
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/name: genai-service
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: genai-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: genai-service
        app.kubernetes.io/part-of: petclinic
        app.kubernetes.io/component: service
    spec:
      serviceAccountName: genai-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done'
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
        - name: wait-for-discovery-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done'
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      containers:
        - name: genai-service
          image: "271369142928.dkr.ecr.us-east-2.amazonaws.com/petclinic-dev/genai-service:v1.0.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          envFrom:
            - configMapRef:
                name: genai-service
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
