apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genai-service-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Goodnessoj/Agentic-DevOps-with-Kimchi-Terraform-EKS-ArgoCD-Helm.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      valueFiles:
        - ../../helm-values/genai-service.yaml
        - ../../helm-values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncPolicy: {}
