apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: visits-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Goodnessoj/Agentic-DevOps-with-Kimchi-Terraform-EKS-ArgoCD-Helm.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      valueFiles:
        - ../../helm-values/visits-service.yaml
        - ../../helm-values/dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
