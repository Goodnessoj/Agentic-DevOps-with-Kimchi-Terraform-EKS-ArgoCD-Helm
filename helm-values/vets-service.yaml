image:
  tag: "v1.0.0"

service:
  port: 8083
  targetPort: 8083

env:
  SPRING_PROFILES_ACTIVE: "docker,mysql,production"
  CONFIG_SERVER_URL: "http://config-server:8888"
  DISCOVERY_SERVER_URL: "http://discovery-server:8761"

envFromSecret:
  SPRING_DATASOURCE_USERNAME:
    secretName: rds-credentials
    key: username
  SPRING_DATASOURCE_PASSWORD:
    secretName: rds-credentials
    key: password

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - 'until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done'
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
  - name: wait-for-discovery-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - 'until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done'
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
